<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChenListen · Drum Room</title>
<style>
  html, body { margin:0; padding:0; background:#0e0905; height:100%; overflow:hidden;
    font-family:-apple-system,"SF Pro Display","PingFang SC",Helvetica,Arial,sans-serif; }
  #wrap { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; }
  #ui { position:fixed; top:14px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px; z-index:10; user-select:none;
    padding:8px 12px; border-radius:999px;
    background:linear-gradient(180deg, rgba(46,32,20,.82), rgba(26,17,10,.68));
    border:1px solid rgba(240,180,110,.20);
    box-shadow:0 10px 36px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,220,170,.08);
    backdrop-filter:blur(14px); }
  button { background:rgba(255,235,200,.05); color:#f3ddba; border:1px solid rgba(240,180,110,.25);
    border-radius:999px; padding:8px 18px; font-size:13px; letter-spacing:1.5px; cursor:pointer;
    transition:all .18s; }
  button:hover { background:rgba(240,180,110,.16); box-shadow:0 0 16px rgba(255,170,80,.35);
    transform:translateY(-1px); }
  #playBtn { background:linear-gradient(135deg,#f59e0b,#ef6c35); color:#1c0e02;
    font-weight:700; border:none; padding:9px 26px; letter-spacing:2px;
    box-shadow:0 0 18px rgba(245,158,11,.55), inset 0 1px 0 rgba(255,240,200,.4); }
  #playBtn:hover { box-shadow:0 0 28px rgba(255,150,60,.8), inset 0 1px 0 rgba(255,245,210,.45);
    transform:translateY(-1px); }
  #bpmBox { color:#caa477; font-size:12.5px; display:flex; align-items:center; gap:8px;
    padding:0 12px; border-left:1px solid rgba(240,180,110,.16);
    border-right:1px solid rgba(240,180,110,.16); }
  input[type=range] { accent-color:#f59e0b; width:96px; }
  select { background:rgba(255,235,200,.05); color:#f3ddba; border:1px solid rgba(240,180,110,.25);
    border-radius:999px; padding:8px 14px; font-size:12.5px; cursor:pointer;
    outline:none; max-width:230px; transition:all .18s;
    appearance:none; -webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M1 1l4 4 4-4' fill='none' stroke='%23caa477' stroke-width='1.6' stroke-linecap='round'/></svg>");
    background-repeat:no-repeat; background-position:right 12px center; padding-right:30px; }
  select:hover { background-color:rgba(240,180,110,.14); box-shadow:0 0 14px rgba(255,170,80,.3); }
  select option { background:#221608; color:#f3ddba; }
  /* 霓虹招牌 */
  #brand { position:fixed; top:16px; left:26px; z-index:10; pointer-events:none;
    font-family:"Brush Script MT","Snell Roundhand",Georgia,cursive; font-style:italic; font-weight:700;
    font-size:26px; letter-spacing:2px; color:#ffd9a0;
    text-shadow:0 0 6px #ffb347, 0 0 16px #ff8c1a, 0 0 34px rgba(255,120,20,.8),
      0 0 60px rgba(255,100,10,.45);
    animation:neon 3.2s ease-in-out infinite; }
  @keyframes neon {
    0%,100% { opacity:1; }

  #brand small { display:block; font-style:normal; font-family:-apple-system,Helvetica; font-weight:400;
    font-size:8.5px; letter-spacing:5px; color:#b8854d; margin-top:0;
    text-shadow:0 0 8px rgba(255,150,60,.6); }
  #legend { position:fixed; left:18px; top:50%; transform:translateY(-44%); z-index:10;
    background:rgba(30,20,12,.6); border:1px solid rgba(240,180,110,.16);
    border-radius:14px; padding:10px 14px 10px 11px; backdrop-filter:blur(8px);
    user-select:none; }
  #legend h4 { margin:0 0 7px 2px; font-size:10px; font-weight:600; letter-spacing:3px;
    color:#9a7748; }
  .lg-row { display:flex; align-items:center; gap:8px; padding:2.5px 0; }
  .lg-row kbd { display:inline-flex; align-items:center; justify-content:center;
    min-width:17px; height:17px; padding:0 3px; border-radius:4px; font-size:10.5px;
    font-family:inherit; font-weight:700; color:#f6e2bd;
    background:rgba(255,225,170,.08); border:1px solid rgba(240,180,110,.32);
    border-bottom-width:2px; }
  .lg-row svg { flex:none; }
  .lg-row span { font-size:11px; color:#bb9568; letter-spacing:.5px; }
  @media (max-width:760px){ #legend{ display:none; } }
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>
<div id="brand">ChenListen<small>DRUMS &amp; PERCUSSION</small></div>
<div id="ui">
  <select id="grooveSel"></select>
  <button id="playBtn">▶&nbsp;播放</button>
  <span id="bpmBox">BPM <input id="bpm" type="range" min="60" max="180" value="100"><b id="bpmVal" style="color:#9fd0ff">100</b></span>
  <button id="midiBtn" title="导入电子鼓导出的 .mid 文件">导入 MIDI</button>
  <input type="file" id="midiFile" accept=".mid,.midi" style="display:none">
</div>
<div id="legend"><h4>键盘演奏</h4></div>

<script>
"use strict";
/* ---------------- 鼓件定义 ---------------- */
const LANES = [
  { id:'crashL', label:'CRASH L', color:'#7dd3fc' },
  { id:'hihat',  label:'HI-HAT',  color:'#22d3ee' },
  { id:'snare',  label:'SNARE',   color:'#34d399' },
  { id:'kick',   label:'KICK',    color:'#3b82f6' },
  { id:'tom1',   label:'TOM 1',   color:'#818cf8' },
  { id:'tom2',   label:'TOM 2',   color:'#747ff5' },
  { id:'ftom',   label:'F.TOM',   color:'#6366f1' },
  { id:'ride',   label:'RIDE',    color:'#5eead4' },
  { id:'crashR', label:'CRASH R', color:'#38bdf8' },
  { id:'cowbell',label:'COWBELL', color:'#fbbf24' },
];
const LANE_IDX = Object.fromEntries(LANES.map((l,i)=>[l.id,i]));
const COLOR = id => LANES[LANE_IDX[id]].color;

/* ---------------- 曲库 ----------------
   说明：以下为「风格还原」谱型（按公开流传的常见谱面写法），非逐音扒带 */
let P = [], LOOP_BEATS = 16, lastHit = [];
function setPattern(notes, loop){
  P = notes; LOOP_BEATS = loop;
  lastHit = new Array(P.length).fill(-99);
  hitSet.clear();
}
function mk(fn){
  const a=[];
  const n=(b,lane,vel=1,open=false)=>a.push({b,lane,vel,open});
  fn(n); a.sort((x,y)=>x.b-y.b); return a;
}
const T3 = 1/3; /* 三连音单位 */
const GROOVES = [
{ name:'综合示范 · Groove+Fill', bpm:100, loop:16, notes:mk(n=>{
  n(0,'crashL',.95); n(0,'kick');
  n(2,'kick',.95); n(2.75,'kick',.8);
  n(1,'snare'); n(3,'snare'); n(3.75,'snare',.3);
  [0.5,1,1.5,2,2.5,3,3.5].forEach(b=>n(b,'hihat', b%1===0?.75:.5));
  n(4,'kick'); n(6,'kick',.95); n(6.75,'kick',.8);
  n(5,'snare'); n(7,'snare'); n(5.75,'snare',.3);
  [4,4.5,5,5.5,6,6.5,7].forEach(b=>n(b,'hihat', b%1===0?.75:.5));
  n(7.5,'hihat',.85,true);
  n(8,'crashR',.9);
  [8,8.5,9,9.5,10,10.5,11,11.5].forEach(b=>n(b,'ride', b%1===0?.85:.55));
  [8,9,10,11].forEach(b=>n(b,'cowbell',.8));
  n(8,'kick'); n(9.5,'kick',.85); n(10.5,'kick',.9);
  n(9,'snare'); n(11,'snare');
  [12,12.5,13,13.5].forEach(b=>n(b,'hihat', b%1===0?.75:.5));
  n(12,'kick'); n(13.5,'kick',.8); n(13,'snare');
  n(14,'snare',.85); n(14.25,'snare',.6); n(14.5,'snare',.9);
  n(14.75,'tom1',.9); n(15,'tom1',.75);
  n(15.25,'tom2',.95); n(15.5,'tom2',.8);
  n(15.75,'ftom');
})},
{ name:'Money Beat · 流行八分基础', bpm:96, loop:8, notes:mk(n=>{
  for(const B of [0,4]){
    for(let i=0;i<8;i++) n(B+i*.5,'hihat', i%2?.5:.75);
    n(B,'kick'); n(B+2,'kick',.95);
    n(B+1,'snare'); n(B+3,'snare');
  }
  n(6.5,'kick',.8);
})},
{ name:'Billie Jean 式 · 节拍器纪律', bpm:117, loop:8, notes:mk(n=>{
  for(const B of [0,4]){
    for(let i=0;i<8;i++) n(B+i*.5,'hihat', i%2?.5:.7);
    n(B,'kick'); n(B+2,'kick');
    n(B+1,'snare',.95); n(B+3,'snare',.95);
  }
})},
{ name:'We Will Rock You 式 · 跺脚拍手', bpm:81, loop:8, notes:mk(n=>{
  for(const B of [0,4]){
    n(B,'kick'); n(B+.5,'kick',.9); n(B+1,'snare');
    n(B+2,'kick'); n(B+2.5,'kick',.9); n(B+3,'snare');
  }
})},
{ name:'Funky Drummer 式 · Ghost 必修', bpm:101, loop:4, notes:mk(n=>{
  for(let i=0;i<16;i++){
    const b=i*.25;
    if(b===3.5){ n(b,'hihat',.8,true); continue; }
    n(b,'hihat', b%1===0?.7:.45);
  }
  n(0,'kick'); n(.75,'kick',.85); n(2,'kick',.95); n(2.5,'kick',.8);
  n(1,'snare'); n(3,'snare');
  [1.25,1.75,2.25,3.75].forEach(b=>n(b,'snare',.25));
})},
{ name:'Cold Sweat 式 · JB Funk', bpm:110, loop:8, notes:mk(n=>{
  for(const B of [0,4]){
    for(let i=0;i<8;i++) n(B+i*.5,'hihat', i%2?.5:.65);
    n(B,'kick'); n(B+2.5,'kick',.9);
    n(B+1,'snare'); n(B+3.5,'snare',.95);
  }
  n(7.25,'snare',.25);
})},
{ name:'Rosanna 式 · 半拍 Shuffle', bpm:85, loop:8, notes:mk(n=>{
  for(const B of [0,4]){
    for(let j=0;j<4;j++){
      n(B+j,'hihat', j===0?.7:.6);
      n(B+j+2*T3,'hihat',.4);
      if(j!==2) n(B+j+T3,'snare',.22);
    }
    n(B+2,'snare');           /* 半拍 backbeat */
    n(B,'kick');
  }
  n(6+2*T3,'kick',.7);
})},
{ name:'布鲁斯 Shuffle', bpm:126, loop:8, notes:mk(n=>{
  for(const B of [0,4]){
    for(let j=0;j<4;j++){ n(B+j,'ride',.7); n(B+j+2*T3,'ride',.45); }
    n(B,'kick',.9); n(B+2,'kick',.9);
    n(B+1,'snare'); n(B+3,'snare');
  }
})},
{ name:'Amen Break 式 · 经典碎拍', bpm:136, loop:16, notes:mk(n=>{
  for(let i=0;i<32;i++) n(i*.5,'ride', i%2?.5:.7);
  for(const B of [0,4]){
    n(B,'kick'); n(B+.5,'kick',.9); n(B+2.5,'kick',.9);
    n(B+1,'snare'); n(B+1.75,'snare',.3);
    n(B+3,'snare'); n(B+3.5,'snare',.3);
  }
  n(8,'kick'); n(8.5,'kick',.9);
  n(9,'snare'); n(9.75,'snare',.3);
  n(10.5,'kick',.9); n(11.5,'snare');      /* 军鼓移位 */
  n(12.5,'kick',.9); n(13.5,'snare');
  n(14,'kick'); n(14.5,'crashR',.9); n(15.5,'snare');
})},
{ name:'Bossa Nova', bpm:132, loop:8, notes:mk(n=>{
  for(const B of [0,4]){
    for(let i=0;i<8;i++) n(B+i*.5,'hihat', i%2?.35:.5);
    n(B,'kick',.9); n(B+1.5,'kick',.8); n(B+2,'kick',.9); n(B+3.5,'kick',.8);
  }
  /* 边击 clave（用军鼓轻击表示）*/
  [0,1.5,3,4.5,6].forEach(b=>n(b,'snare',.5));
})},
{ name:'爵士 Swing · Spang-a-lang', bpm:140, loop:8, notes:mk(n=>{
  for(const B of [0,4]){
    n(B,'ride',.8); n(B+1,'ride',.65); n(B+1+2*T3,'ride',.45);
    n(B+2,'ride',.8); n(B+3,'ride',.65); n(B+3+2*T3,'ride',.45);
    n(B+1,'hihat',.55); n(B+3,'hihat',.55);   /* 踩镲脚 */
    n(B,'kick',.2); n(B+2,'kick',.2);          /* feather */
  }
  n(5+T3,'snare',.3); n(7+2*T3,'snare',.35);   /* comping */
})},
{ name:'Disco · 四上底鼓', bpm:118, loop:8, notes:mk(n=>{
  n(0,'crashL',.85);
  for(const B of [0,4]){
    for(let j=0;j<4;j++){
      n(B+j,'kick');
      n(B+j,'hihat',.5);
      n(B+j+.5,'hihat',.6,true);   /* 反拍开镲 */
    }
    n(B+1,'snare',.95); n(B+3,'snare',.95);
  }
})},
];

/* ---------------- Web Audio 鼓声合成 ---------------- */
let ctx=null, master=null, noiseBuf=null;
function initAudio(){
  ctx = new (window.AudioContext||window.webkitAudioContext)();
  master = ctx.createDynamicsCompressor();
  master.threshold.value=-14; master.ratio.value=4;
  const g = ctx.createGain(); g.gain.value=.9;
  master.connect(g); g.connect(ctx.destination);
  const len = ctx.sampleRate*2;
  noiseBuf = ctx.createBuffer(1,len,ctx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
}
function noise(t, dur, type, freq, q, vel){
  const src=ctx.createBufferSource(); src.buffer=noiseBuf;
  const f=ctx.createBiquadFilter(); f.type=type; f.frequency.value=freq; f.Q.value=q;
  const g=ctx.createGain();
  g.gain.setValueAtTime(vel,t);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  src.connect(f); f.connect(g); g.connect(master);
  src.start(t); src.stop(t+dur+.05);
}
function tone(t, f0, f1, dur, vel, type='sine'){
  const o=ctx.createOscillator(); o.type=type;
  o.frequency.setValueAtTime(f0,t);
  o.frequency.exponentialRampToValueAtTime(Math.max(f1,20),t+dur*.4);
  const g=ctx.createGain();
  g.gain.setValueAtTime(vel,t);
  g.gain.exponentialRampToValueAtTime(.001,t+dur);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t+dur+.05);
}
const SYNTH = {
  kick(t,v){ tone(t,150,45,.4,1.2*v); noise(t,.02,'highpass',2000,.5,.4*v); },
  snare(t,v){ tone(t,190,150,.12,.55*v,'triangle'); noise(t,.18,'highpass',900,.6,.9*v); noise(t,.1,'bandpass',1800,1,.5*v); },
  hihat(t,v,open){ noise(t,open?.4:.05,'highpass',7500,.8,(open?.55:.5)*v); if(open) noise(t,.3,'bandpass',9500,2,.25*v); },
  tom1(t,v){ tone(t,235,155,.28,.85*v); noise(t,.03,'highpass',1500,.5,.25*v); },
  tom2(t,v){ tone(t,180,115,.32,.9*v); noise(t,.03,'highpass',1300,.5,.25*v); },
  ftom(t,v){ tone(t,130,80,.4,1.0*v); noise(t,.03,'highpass',1100,.5,.25*v); },
  crashL(t,v){ noise(t,1.5,'highpass',4500,.4,.55*v); noise(t,.9,'bandpass',7000,.6,.35*v); },
  crashR(t,v){ noise(t,1.3,'highpass',5400,.4,.5*v); noise(t,.8,'bandpass',8200,.6,.3*v); },
  ride(t,v){ noise(t,.5,'highpass',8000,.7,.4*v); tone(t,5200,5000,.35,.06*v,'square'); },
  cowbell(t,v){ tone(t,555,540,.18,.3*v,'square'); tone(t,825,800,.13,.22*v,'square'); noise(t,.015,'highpass',3000,.5,.15*v); },
};
function playDrum(lane,t,vel,open){ (lane==='hihat') ? SYNTH.hihat(t,vel,open) : SYNTH[lane](t,vel); }

/* ---------------- 走带 / 调度 ---------------- */
let playing=false, bpm=100, startTime=0;
let schedPtr=0, schedLoop=0;
const spb = () => 60/bpm;
const LEAD = 1.2;
const hitSet = new Set();
let flashes = {};
let particles = [];

function schedule(){
  if(!playing || !P.length) return;
  const ahead = ctx.currentTime + .12;
  while(true){
    const ev = P[schedPtr];
    const t = startTime + (schedLoop*LOOP_BEATS + ev.b)*spb();
    if(t > ahead) break;
    playDrum(ev.lane, Math.max(t,ctx.currentTime), ev.vel, ev.open);
    schedPtr++;
    if(schedPtr>=P.length){ schedPtr=0; schedLoop++; }
  }
}

/* ---------------- 画布 ---------------- */
const cv=document.getElementById('cv'), g2=cv.getContext('2d');
let W=0,H=0,dpr=1;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=cv.clientWidth; H=cv.clientHeight;
  cv.width=W*dpr; cv.height=H*dpr;
  g2.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize); resize();

/* ===== 鼓谱区（上方）===== */
function scoreGeom(){
  const top = 64;
  const h = Math.min(H*.24, 175);
  const ls = h/9;
  const lineY = i => top + h - 2.2*ls - i*ls;
  const x0 = 72, x1 = W - 36;
  return { top, h, ls, lineY, x0, x1,
    pxPerBeat: (x1 - x0) / LOOP_BEATS };
}
/* 符头纵向位置（标准打击乐记谱）*/
function noteY(sg, lane){
  const { lineY, ls } = sg;
  switch(lane){
    case 'kick':   return lineY(0)-ls*0.5;
    case 'ftom':   return lineY(1)-ls*0.5;
    case 'snare':  return lineY(2)-ls*0.5;
    case 'tom2':   return lineY(3);
    case 'tom1':   return lineY(3)-ls*0.5;
    case 'cowbell':return lineY(4)-ls*0.5;
    case 'ride':   return lineY(4);
    case 'hihat':  return lineY(4)-ls;
    case 'crashL': return lineY(4)-ls*1.7;
    case 'crashR': return lineY(4)-ls*1.7;
  }
}
const CYM = { hihat:1, crashL:1, crashR:1, ride:1 };
function drawNotehead(x, y, lane, alpha, vel, open, glow){
  const col = COLOR(lane);
  g2.save();
  g2.globalAlpha = alpha;
  g2.strokeStyle = col; g2.fillStyle = col;
  if(glow>0){ g2.shadowColor=col; g2.shadowBlur=10+glow*14; }
  const r = 4.6;
  if(lane==='cowbell'){          /* 三角符头 */
    g2.lineWidth=1.6;
    g2.beginPath();
    g2.moveTo(x,y-r); g2.lineTo(x+r,y+r); g2.lineTo(x-r,y+r); g2.closePath();
    g2.stroke();
  } else if(CYM[lane]){          /* x 符头 */
    g2.lineWidth = 1.8;
    g2.beginPath();
    g2.moveTo(x-r,y-r); g2.lineTo(x+r,y+r);
    g2.moveTo(x+r,y-r); g2.lineTo(x-r,y+r);
    g2.stroke();
    if(open){ g2.lineWidth=1.2; g2.beginPath(); g2.arc(x,y-r-5,2.6,0,Math.PI*2); g2.stroke(); }
  } else {                       /* 实心符头 */
    g2.beginPath();
    g2.ellipse(x,y,r+.8,r-.6,-0.35,0,Math.PI*2);
    g2.fill();
    if(vel<.45){                 /* ghost note 括号 */
      g2.lineWidth=1; g2.globalAlpha=alpha*.8;
      g2.beginPath(); g2.arc(x-r-3.5,y,r+1,Math.PI*.6,Math.PI*1.4); g2.stroke();
      g2.beginPath(); g2.arc(x+r+3.5,y,r+1,Math.PI*1.6,Math.PI*.4); g2.stroke();
    }
  }
  g2.restore();
}
/* 命中检测（与谱面绘制解耦）*/
function detectHits(now, nowP){
  if(!ctx || startTime===0 || !playing) return;
  const k0 = Math.max(0, Math.floor((now-startTime)/(LOOP_BEATS*spb())));
  for(const k of [k0-1, k0]){
    if(k<0) continue;
    for(let i=0;i<P.length;i++){
      const ev=P[i];
      const t = startTime + (k*LOOP_BEATS+ev.b)*spb();
      const id = k+':'+i;
      if(t<=now && now-t<.25 && !hitSet.has(id)){
        hitSet.add(id);
        lastHit[i]=now;
        flashes[ev.lane]=nowP;
        stickHit(ev.lane, nowP);
        const kp = kitPos(ev.lane);
        spawnParticles(kp.x, kp.y, COLOR(ev.lane), ev.vel);
      }
    }
  }
}
/* 静态谱面 + 随演奏移动的指针 */
function drawScore(now){
  const sg = scoreGeom();
  const { top, h, ls, lineY, x0, x1, pxPerBeat } = sg;
  g2.save();
  const pg = g2.createLinearGradient(0,top-14,0,top+h+10);
  pg.addColorStop(0,'rgba(42,28,14,0)'); pg.addColorStop(.5,'rgba(42,28,14,.62)'); pg.addColorStop(1,'rgba(42,28,14,0)');
  g2.fillStyle=pg; g2.fillRect(0,top-14,W,h+24);
  /* 五线 */
  g2.strokeStyle='rgba(225,195,150,.30)'; g2.lineWidth=1;
  for(let i=0;i<5;i++){ g2.beginPath(); g2.moveTo(26,lineY(i)); g2.lineTo(x1+10,lineY(i)); g2.stroke(); }
  /* 打击乐谱号 */
  g2.fillStyle='rgba(240,210,165,.6)';
  g2.fillRect(34, lineY(3)-2, 3.5, (lineY(1)-lineY(3))+4);
  g2.fillRect(41, lineY(3)-2, 3.5, (lineY(1)-lineY(3))+4);
  /* 小节线 / 拍线 */
  for(let b=0;b<=LOOP_BEATS;b++){
    const x = x0 + b*pxPerBeat;
    const bar = b%4===0;
    g2.strokeStyle = bar?'rgba(225,195,150,.38)':'rgba(225,195,150,.10)';
    g2.lineWidth = bar?1.4:1;
    g2.beginPath(); g2.moveTo(x,lineY(4)-(bar?ls*1.6:0)); g2.lineTo(x,lineY(0)); g2.stroke();
  }
  /* 音符（位置固定）*/
  for(let i=0;i<P.length;i++){
    const ev=P[i];
    const x = x0 + ev.b*pxPerBeat;
    const since = now - lastHit[i];
    const glow = (since>=0 && since<.3) ? 1-since/.3 : 0;
    drawNotehead(x, noteY(sg,ev.lane), ev.lane,
      .45+ev.vel*.45+glow*.1, ev.vel, ev.open, glow);
  }
  /* 指针：随演奏从左到右扫过，循环回到行首 */
  let px = x0;
  if(ctx && startTime>0){
    const beatNow = (now-startTime)/spb();
    if(beatNow>0) px = x0 + (beatNow % LOOP_BEATS)*pxPerBeat;
  }
  g2.strokeStyle='rgba(255,205,130,.9)'; g2.lineWidth=1.6;
  g2.shadowColor='#ffb347'; g2.shadowBlur=12;
  g2.beginPath(); g2.moveTo(px, top-6); g2.lineTo(px, top+h+2); g2.stroke();
  /* 指针小三角 */
  g2.fillStyle='rgba(255,205,130,.95)';
  g2.beginPath(); g2.moveTo(px-5,top-12); g2.lineTo(px+5,top-12); g2.lineTo(px,top-4); g2.closePath(); g2.fill();
  g2.restore();
}

/* ===== 鼓房场景 ===== */
function roundRect(x,y,w,h,r){
  g2.moveTo(x+r,y); g2.arcTo(x+w,y,x+w,y+h,r); g2.arcTo(x+w,y+h,x,y+h,r);
  g2.arcTo(x,y+h,x,y,r); g2.arcTo(x,y,x+w,y,r); g2.closePath();
}
function drawRoom(){
  const sg=scoreGeom();
  const {s,cx,cy}=kitScale();
  const floorY = Math.max(sg.top+sg.h+30, cy-185*s);   /* 墙脚线 */
  /* 后墙 */
  const wg=g2.createLinearGradient(0,0,0,floorY);
  wg.addColorStop(0,'#150e07'); wg.addColorStop(.7,'#211507'); wg.addColorStop(1,'#2a1b09');
  g2.fillStyle=wg; g2.fillRect(0,0,W,floorY);
  /* 吸音棉（金字塔棉格）*/
  const tile=46;
  g2.save();
  for(let y=0;y<floorY;y+=tile){
    for(let x=((y/tile)%2)*(tile/2)-tile/2;x<W;x+=tile){
      g2.fillStyle='rgba(0,0,0,.16)';
      g2.fillRect(x+2,y+2,tile-4,Math.min(tile-4,floorY-y-2));
      g2.fillStyle='rgba(255,200,130,.025)';
      g2.beginPath();
      g2.moveTo(x+2,y+tile-2); g2.lineTo(x+tile/2,y+tile/2); g2.lineTo(x+tile-2,y+tile-2);
      g2.closePath(); g2.fill();
    }
  }
  g2.restore();
  /* 墙脚线 */
  g2.fillStyle='#0d0804'; g2.fillRect(0,floorY-4,W,5);
  /* 木地板 */
  const fg=g2.createLinearGradient(0,floorY,0,H);
  fg.addColorStop(0,'#3a2410'); fg.addColorStop(.5,'#2b1a0b'); fg.addColorStop(1,'#1a0f06');
  g2.fillStyle=fg; g2.fillRect(0,floorY,W,H-floorY);
  g2.strokeStyle='rgba(0,0,0,.30)'; g2.lineWidth=1;
  let row=0;
  for(let y=floorY+18;y<H;y+=26+row*3){
    g2.beginPath(); g2.moveTo(0,y); g2.lineTo(W,y); g2.stroke();
    /* 错缝竖接口 */
    const off=(row%2)*180+60;
    for(let x=off;x<W;x+=360){
      g2.beginPath(); g2.moveTo(x,y); g2.lineTo(x,Math.min(y+26+row*3,H)); g2.stroke();
    }
    row++;
  }
  /* 地板高光反射 */
  const sheen=g2.createLinearGradient(0,floorY,0,floorY+90);
  sheen.addColorStop(0,'rgba(255,190,110,.07)'); sheen.addColorStop(1,'rgba(255,190,110,0)');
  g2.fillStyle=sheen; g2.fillRect(0,floorY,W,90);
  /* 聚光灯：光锥 + 地面光池 */
  g2.save();
  const beam=g2.createLinearGradient(cx,0,cx,cy);
  beam.addColorStop(0,'rgba(255,205,130,.10)'); beam.addColorStop(1,'rgba(255,205,130,0)');
  g2.fillStyle=beam;
  g2.beginPath();
  g2.moveTo(cx-60,0); g2.lineTo(cx+60,0);
  g2.lineTo(cx+430*s,cy+200*s); g2.lineTo(cx-430*s,cy+200*s);
  g2.closePath(); g2.fill();
  const pool=g2.createRadialGradient(cx,cy,40*s,cx,cy,430*s);
  pool.addColorStop(0,'rgba(255,200,120,.13)'); pool.addColorStop(1,'rgba(255,200,120,0)');
  g2.fillStyle=pool;
  g2.beginPath(); g2.ellipse(cx,cy,440*s,270*s,0,0,Math.PI*2); g2.fill();
  g2.restore();
  /* 墙上海报（窄屏不画）*/
  if(W>980){
    const px=W-200, py=Math.max(70,sg.top-46), pw=120, ph=150;
    if(py+ph<floorY-10){
      g2.save();
      g2.fillStyle='#0c0703'; g2.fillRect(px-5,py-5,pw+10,ph+10);
      const pg2=g2.createLinearGradient(px,py,px,py+ph);
      pg2.addColorStop(0,'#27190b'); pg2.addColorStop(1,'#1a1006');
      g2.fillStyle=pg2; g2.fillRect(px,py,pw,ph);
      g2.strokeStyle='rgba(240,180,110,.3)'; g2.lineWidth=1; g2.strokeRect(px,py,pw,ph);
      g2.fillStyle='rgba(255,210,150,.75)';
      g2.font='italic 700 15px Georgia,serif'; g2.textAlign='center';
      g2.fillText('LIVE',px+pw/2,py+34);
      g2.font='700 10px -apple-system,Helvetica';
      g2.fillStyle='rgba(255,190,120,.5)';
      g2.fillText('CHENLISTEN',px+pw/2,py+52);
      g2.strokeStyle='rgba(255,190,120,.35)';
      g2.beginPath(); g2.arc(px+pw/2,py+98,26,0,Math.PI*2); g2.stroke();
      g2.beginPath(); g2.arc(px+pw/2,py+98,17,0,Math.PI*2); g2.stroke();
      g2.fillStyle='rgba(255,190,120,.4)';
      g2.font='600 8px -apple-system,Helvetica';
      g2.fillText('DRUM ROOM SESSIONS',px+pw/2,py+ph-12);
      g2.restore();
    }
  }
  /* 角落音箱（右下）*/
  if(W>900){
    const aw=120*s, ah=86*s, ax=W-aw-26, ay=H-ah-18;
    g2.save();
    g2.fillStyle='#120b05';
    g2.beginPath(); roundRect(ax,ay,aw,ah,8*s); g2.fill();
    g2.strokeStyle='rgba(240,180,110,.22)'; g2.lineWidth=1.5; g2.stroke();
    g2.strokeStyle='rgba(255,200,130,.10)';
    for(let i=1;i<6;i++){
      g2.beginPath();
      g2.moveTo(ax+10*s, ay+ah*0.32+i*ah*0.1);
      g2.lineTo(ax+aw-10*s, ay+ah*0.32+i*ah*0.1);
      g2.stroke();
    }
    g2.fillStyle='rgba(255,220,160,.5)';
    g2.font=`italic 700 ${11*s}px Georgia,serif`; g2.textAlign='left';
    g2.fillText('ChenListen', ax+10*s, ay+16*s);
    /* 电源 LED */
    g2.beginPath(); g2.arc(ax+aw-12*s, ay+12*s, 2.6*s, 0, Math.PI*2);
    g2.fillStyle='#ff8c2a'; g2.shadowColor='#ff8c2a'; g2.shadowBlur=8; g2.fill();
    g2.restore();
  }
}

/* ===== 俯视鼓组（鼓手视角：画面下方 = 鼓手）===== */
/* 设计坐标：原点 = 鼓组中心，x 右正，y 下正（朝鼓手），幅面 ~800×430 */
const KIT = {
  kick:   { type:'kick', x:   0, y:-12, r: 92 },
  tom1:   { type:'drum', x: -54, y:-70, r: 44 },
  tom2:   { type:'drum', x:  52, y:-66, r: 54 },
  snare:  { type:'drum', x: -81, y: 36, r: 52 },
  ftom:   { type:'drum', x: 104, y: 76, r: 68 },
  hihat:  { type:'hh',   x:-180, y:-10, r: 50 },
  crashL: { type:'cym',  x:-153, y:-128, r: 66 },
  crashR: { type:'cym',  x: 128, y:-162, r: 74 },
  ride:   { type:'cym',  x: 210, y:-30, r: 82 },
  cowbell:{ type:'bell', x:  -2, y:-34 },
};
function kitScale(){
  const sg=scoreGeom();
  const topEdge = sg.top + sg.h + 26;
  const availH = H - topEdge - 34;
  const s = Math.min(W/820, availH/460);
  return { s, cx: W/2, cy: topEdge + availH*0.56 };
}
function kitPos(lane){
  const {s,cx,cy}=kitScale(); const k=KIT[lane];
  return { x: cx+k.x*s, y: cy+k.y*s, s };
}
function glowOf(lane,nowP){
  const f=flashes[lane];
  return f===undefined?0:Math.max(0,1-(nowP-f)/.35);
}
/* 地毯 */
function drawRug(){
  const {s,cx,cy}=kitScale();
  g2.save();
  const rx=380*s, ry=235*s;
  const rg=g2.createRadialGradient(cx,cy,rx*.2,cx,cy,rx);
  rg.addColorStop(0,'rgba(82,52,24,.5)');
  rg.addColorStop(1,'rgba(45,28,12,.18)');
  g2.fillStyle=rg;
  g2.beginPath(); g2.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); g2.fill();
  g2.strokeStyle='rgba(230,175,110,.22)'; g2.lineWidth=1.5;
  g2.stroke();
  g2.beginPath(); g2.ellipse(cx,cy,rx*.93,ry*.93,0,0,Math.PI*2);
  g2.strokeStyle='rgba(230,175,110,.10)'; g2.stroke();
  g2.restore();
}
/* 俯视镲片：同心环纹 + 中央 bell */
function drawCymbalTop(lane, nowP){
  const {x,y,s}=kitPos(lane); const k=KIT[lane];
  const glow=glowOf(lane,nowP), col=COLOR(lane);
  const pulse = glow>0 ? 1+Math.sin(nowP*46)*.035*glow : 1;
  const r=k.r*s*pulse;
  g2.save();
  g2.shadowColor=col; g2.shadowBlur=glow>0?14+glow*30:6;
  const grad=g2.createRadialGradient(x-r*.3,y-r*.3,r*.1,x,y,r);
  grad.addColorStop(0, glow>0?'#8ba6c8':'#62799a');
  grad.addColorStop(.7,'#3c4f6e');
  grad.addColorStop(1,'#2a3a55');
  g2.fillStyle=grad;
  g2.beginPath(); g2.arc(x,y,r,0,Math.PI*2); g2.fill();
  g2.strokeStyle = glow>0 ? col : 'rgba(160,190,230,.45)';
  g2.lineWidth = 1.6+glow*1.6;
  g2.stroke();
  /* 环纹 */
  g2.strokeStyle = glow>0 ? col : 'rgba(170,200,240,.16)';
  g2.globalAlpha = glow>0 ? .25+glow*.3 : 1;
  g2.lineWidth=1;
  for(const f of [.78,.58,.38]){
    g2.beginPath(); g2.arc(x,y,r*f,0,Math.PI*2); g2.stroke();
  }
  g2.globalAlpha=1;
  /* bell */
  g2.beginPath(); g2.arc(x,y,r*.17,0,Math.PI*2);
  g2.fillStyle = glow>0 ? col : '#76573b';
  g2.globalAlpha = glow>0 ? .9 : .55;
  g2.fill();
  g2.globalAlpha=1;
  if(glow>0){
    g2.globalAlpha=glow*.18; g2.fillStyle=col;
    g2.beginPath(); g2.arc(x,y,r,0,Math.PI*2); g2.fill();
    g2.globalAlpha=1;
  }
  g2.restore();
}
/* 俯视踩镲：双片错位 + 中轴 */
function drawHiHatTop(nowP){
  const {x,y,s}=kitPos('hihat'); const k=KIT.hihat;
  const glow=glowOf('hihat',nowP), col=COLOR('hihat');
  const r=k.r*s;
  g2.save();
  /* 下片露出的月牙 */
  g2.beginPath(); g2.arc(x+3*s,y+3*s,r,0,Math.PI*2);
  g2.fillStyle='#2c3d59'; g2.fill();
  g2.shadowColor=col; g2.shadowBlur=glow>0?14+glow*28:6;
  const grad=g2.createRadialGradient(x-r*.3,y-r*.3,r*.1,x,y,r);
  grad.addColorStop(0, glow>0?'#8fb2d4':'#67809f');
  grad.addColorStop(1,'#2e405e');
  g2.fillStyle=grad;
  g2.beginPath(); g2.arc(x,y,r*.96,0,Math.PI*2); g2.fill();
  g2.strokeStyle = glow>0 ? col : 'rgba(160,190,230,.45)';
  g2.lineWidth=1.6+glow*1.6; g2.stroke();
  g2.strokeStyle = glow>0 ? col : 'rgba(170,200,240,.16)';
  g2.globalAlpha = glow>0 ? .3+glow*.3 : 1;
  g2.lineWidth=1;
  for(const f of [.72,.48]){ g2.beginPath(); g2.arc(x,y,r*f,0,Math.PI*2); g2.stroke(); }
  g2.globalAlpha=1;
  /* 中轴 */
  g2.beginPath(); g2.arc(x,y,3.4*s,0,Math.PI*2);
  g2.fillStyle = glow>0 ? col : '#8aa3c4'; g2.fill();
  if(glow>0){
    g2.globalAlpha=glow*.2; g2.fillStyle=col;
    g2.beginPath(); g2.arc(x,y,r,0,Math.PI*2); g2.fill();
  }
  g2.restore();
}
/* 俯视鼓：鼓圈 + 鼓皮 + 调音螺丝 */
function drawDrumTop(lane, nowP, brandOnHead){
  const {x,y,s}=kitPos(lane); const k=KIT[lane];
  const glow=glowOf(lane,nowP), col=COLOR(lane);
  const r=k.r*s;
  g2.save();
  g2.shadowColor=col; g2.shadowBlur=glow>0?14+glow*30:5;
  /* 鼓圈 */
  g2.beginPath(); g2.arc(x,y,r,0,Math.PI*2);
  g2.fillStyle='#1b2a42'; g2.fill();
  g2.lineWidth=2.4+glow*1.6;
  g2.strokeStyle = glow>0 ? col : 'rgba(130,160,200,.5)';
  g2.stroke();
  g2.shadowBlur=0;
  /* 鼓皮 */
  const head=g2.createRadialGradient(x-r*.28,y-r*.3,r*.08,x,y,r*.9);
  head.addColorStop(0, glow>0?'rgba(225,242,255,.55)':'rgba(200,218,240,.30)');
  head.addColorStop(.8,'rgba(150,175,210,.12)');
  head.addColorStop(1,'rgba(120,150,190,.08)');
  g2.beginPath(); g2.arc(x,y,r*.9,0,Math.PI*2);
  g2.fillStyle=head; g2.fill();
  if(glow>0){
    g2.globalAlpha=glow*.32; g2.fillStyle=col;
    g2.beginPath(); g2.arc(x,y,r*.9,0,Math.PI*2); g2.fill();
    g2.globalAlpha=1;
    /* 震动环 */
    g2.strokeStyle=col; g2.globalAlpha=glow*.5; g2.lineWidth=1.4;
    g2.beginPath(); g2.arc(x,y,r*(1.05+(1-glow)*.3),0,Math.PI*2); g2.stroke();
    g2.globalAlpha=1;
  }
  /* 调音螺丝 */
  const n = r>50*s?8:6;
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2+.3;
    g2.beginPath();
    g2.arc(x+Math.cos(a)*r*.94, y+Math.sin(a)*r*.94, 2.2*s, 0, Math.PI*2);
    g2.fillStyle = glow>0 ? col : 'rgba(170,195,225,.5)';
    g2.fill();
  }
  g2.restore();
}
/* 俯视底鼓：大圆（被嗵鼓部分遮挡）+ 踏板 */
function drawKickTop(nowP){
  const {x,y,s}=kitPos('kick'); const k=KIT.kick;
  const glow=glowOf('kick',nowP), col=COLOR('kick');
  const r=k.r*s;
  g2.save();
  g2.shadowColor=col; g2.shadowBlur=glow>0?16+glow*32:6;
  /* 鼓腔（俯视看到的是鼓身圆筒） */
  g2.beginPath(); g2.arc(x,y,r,0,Math.PI*2);
  const shell=g2.createRadialGradient(x-r*.3,y-r*.35,r*.15,x,y,r);
  shell.addColorStop(0,'#26405f'); shell.addColorStop(.8,'#152337'); shell.addColorStop(1,'#0f1a2c');
  g2.fillStyle=shell; g2.fill();
  g2.lineWidth=3+glow*2;
  g2.strokeStyle = glow>0 ? col : 'rgba(120,150,195,.55)';
  g2.stroke();
  g2.shadowBlur=0;
  if(glow>0){
    g2.globalAlpha=glow*.25; g2.fillStyle=col;
    g2.beginPath(); g2.arc(x,y,r,0,Math.PI*2); g2.fill();
    g2.globalAlpha=1;
  }
  /* 踏板（朝鼓手） */
  const py=y+r;
  g2.strokeStyle = glow>0 ? col : 'rgba(150,170,200,.45)';
  g2.lineWidth=3*s;
  g2.beginPath(); g2.moveTo(x,py-4*s); g2.lineTo(x,py+22*s); g2.stroke();
  g2.fillStyle = glow>0 ? col : 'rgba(140,165,200,.4)';
  const pw=16*s, ph=26*s;
  g2.beginPath();
  g2.moveTo(x-pw/2,py+22*s+ph); g2.lineTo(x+pw/2,py+22*s+ph);
  g2.lineTo(x+pw*.36,py+22*s); g2.lineTo(x-pw*.36,py+22*s);
  g2.closePath(); g2.fill();
  g2.restore();
}
/* 牛铃：梯形，开口朝鼓手 */
function drawCowbellTop(nowP){
  const {x,y,s}=kitPos('cowbell');
  const glow=glowOf('cowbell',nowP), col=COLOR('cowbell');
  const w1=20*s, w2=30*s, h=34*s;
  g2.save();
  g2.translate(x,y);
  g2.shadowColor=col; g2.shadowBlur=glow>0?12+glow*26:4;
  const grad=g2.createLinearGradient(0,-h/2,0,h/2);
  grad.addColorStop(0,'#4a3d28'); grad.addColorStop(1, glow>0?'#8a6f3d':'#5f4f30');
  g2.fillStyle=grad;
  g2.beginPath();
  g2.moveTo(-w1/2,-h/2); g2.lineTo(w1/2,-h/2);
  g2.lineTo(w2/2,h/2); g2.lineTo(-w2/2,h/2);
  g2.closePath(); g2.fill();
  g2.strokeStyle = glow>0 ? col : 'rgba(220,190,120,.45)';
  g2.lineWidth=1.6+glow*1.4;
  g2.stroke();
  /* 开口 */
  g2.beginPath();
  g2.moveTo(-w2/2+3*s,h/2); g2.lineTo(w2/2-3*s,h/2);
  g2.strokeStyle = glow>0 ? col : 'rgba(255,225,150,.35)';
  g2.lineWidth=3*s; g2.stroke();
  if(glow>0){
    g2.globalAlpha=glow*.3; g2.fillStyle=col;
    g2.beginPath();
    g2.moveTo(-w1/2,-h/2); g2.lineTo(w1/2,-h/2);
    g2.lineTo(w2/2,h/2); g2.lineTo(-w2/2,h/2);
    g2.closePath(); g2.fill();
  }
  g2.restore();
}

/* ===== 鼓槌（跟随敲击）===== */
const HAND = { snare:'L', tom1:'L', crashL:'L', hihat:'R', ride:'R', crashR:'R',
               tom2:'R', ftom:'R', cowbell:'R' };
const sticks = {
  L:{ x:null, y:null, tx:null, ty:null, hitT:-9 },
  R:{ x:null, y:null, tx:null, ty:null, hitT:-9 },
};
function stickAnchor(hand){
  const {s,cx,cy}=kitScale();
  return { x: cx+(hand==='L'?-195:195)*s, y: cy+235*s, s };
}
function stickHit(lane,nowP){
  const hand=HAND[lane];
  if(!hand) return;                       // kick 用脚
  const p=kitPos(lane);
  sticks[hand].tx=p.x; sticks[hand].ty=p.y;
  sticks[hand].hitT=nowP;
}
function drawSticks(nowP,dt){
  for(const hand of ['L','R']){
    const st=sticks[hand], a=stickAnchor(hand);
    /* 初始/默认停留位 */
    if(st.tx===null){
      const home=kitPos(hand==='L'?'snare':'hihat');
      st.tx=home.x; st.ty=home.y;
    }
    if(st.x===null){ st.x=st.tx; st.y=st.ty; }
    /* 棒尖快速追到目标部件中心 → 必定击中 */
    const f=Math.min(1,dt*18);
    st.x+=(st.tx-st.x)*f; st.y+=(st.ty-st.y)*f;
    const since=nowP-st.hitT;
    const strike = since<.13 ? Math.sin(since/.13*Math.PI) : 0;
    /* 棒身定长，从棒尖朝鼓手方向延伸（手悬在鼓面上方移动）*/
    const L=185*a.s;
    const dx=st.x-a.x, dy=st.y-a.y;
    const d=Math.hypot(dx,dy)||1;
    const ux=dx/d, uy=dy/d;
    const tipX=st.x-ux*4*a.s*strike, tipY=st.y-uy*4*a.s*strike; /* 击打瞬间微缩 */
    const buttX=tipX-ux*L, buttY=tipY-uy*L;
    g2.save();
    g2.strokeStyle='rgba(202,164,114,.85)';
    g2.lineWidth=4.5*a.s; g2.lineCap='round';
    g2.shadowColor='rgba(0,0,0,.5)'; g2.shadowBlur=4;
    g2.beginPath();
    g2.moveTo(buttX,buttY);
    g2.lineTo(tipX,tipY); g2.stroke();
    g2.beginPath(); g2.arc(tipX,tipY,3.6*a.s,0,Math.PI*2);
    g2.fillStyle = strike>0 ? '#f4e3c2' : '#d9bb8a';
    g2.fill();
    g2.restore();
  }
}

function drawKit(nowP,dt){
  drawRug();
  /* 鼓 → 镲（镲片更高，俯视在最上层）→ 牛铃/鼓槌 */
  drawKickTop(nowP);
  drawDrumTop('tom1',nowP,false);
  drawDrumTop('tom2',nowP,false);
  drawDrumTop('snare',nowP,true);
  drawDrumTop('ftom',nowP,false);
  drawCymbalTop('ride',nowP);
  drawCymbalTop('crashL',nowP);
  drawCymbalTop('crashR',nowP);
  drawHiHatTop(nowP);
  drawCowbellTop(nowP);
  drawSticks(nowP,dt);
}

/* ---------------- 粒子 ---------------- */
function spawnParticles(cx, cy, color, vel){
  const n = 8 + Math.round(vel*12);
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;          // 俯视：向四周迸
    const sp = (40+Math.random()*170)*(0.5+vel*.7);
    particles.push({ x:cx, y:cy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
      life:.35+Math.random()*.3, t:0, color, r:1+Math.random()*2.2 });
  }
}

/* ---------------- 主渲染 ---------------- */
let lastTs=0;
function render(ts){
  requestAnimationFrame(render);
  const dt = Math.min(.05,(ts-lastTs)/1000)||0; lastTs=ts;
  const nowP = ts/1000;
  const now = ctx ? ctx.currentTime : 0;

  drawRoom();

  detectHits(now, nowP);
  drawScore(now);
  if(playing) schedule();
  if(hitSet.size>600) hitSet.clear();
  drawKit(nowP,dt);

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.t+=dt;
    if(p.t>=p.life){ particles.splice(i,1); continue; }
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=1-1.8*dt; p.vy*=1-1.8*dt;       // 俯视：摩擦减速，无重力
    const a=1-p.t/p.life;
    g2.save();
    g2.globalAlpha=a*.9; g2.shadowColor=p.color; g2.shadowBlur=6;
    g2.fillStyle=p.color;
    g2.beginPath(); g2.arc(p.x,p.y,p.r*a,0,Math.PI*2); g2.fill();
    g2.restore();
  }
}
requestAnimationFrame(render);

/* ---------------- 控制 ---------------- */
const playBtn=document.getElementById('playBtn');
const bpmSlider=document.getElementById('bpm'), bpmVal=document.getElementById('bpmVal');
bpmSlider.addEventListener('input',()=>{ bpmVal.textContent=bpmSlider.value; });

/* 曲库选择 */
const grooveSel=document.getElementById('grooveSel');
function rebuildGrooveSel(){
  grooveSel.innerHTML='';
  GROOVES.forEach((g,i)=>{
    const o=document.createElement('option');
    o.value=i; o.textContent=g.name;
    grooveSel.appendChild(o);
  });
}
function loadGroove(i){
  const g=GROOVES[i];
  setPattern(g.notes, g.loop);
  bpmSlider.value=g.bpm; bpmVal.textContent=g.bpm;
  grooveSel.value=String(i);
}
rebuildGrooveSel();
loadGroove(0);
grooveSel.addEventListener('change',()=>{
  loadGroove(+grooveSel.value);
  if(ctx && startTime>0) start();   /* 已在播放状态则换曲重开 */
});

/* ---------------- MIDI 导入（SMF，鼓轨 = 通道 10）---------------- */
const GM_MAP = {
  35:'kick',36:'kick',
  38:'snare',40:'snare',37:'snare',
  42:'hihat',44:'hihat',46:'hihat',   /* 46 = 开镲 */
  48:'tom1',50:'tom1',
  45:'tom2',47:'tom2',
  41:'ftom',43:'ftom',
  49:'crashL',55:'crashL',
  57:'crashR',52:'crashR',
  51:'ride',53:'ride',59:'ride',
  56:'cowbell',
};
function parseMidi(buf){
  const d=new DataView(buf); let p=0;
  const u32=()=>{const v=d.getUint32(p);p+=4;return v;};
  const u16=()=>{const v=d.getUint16(p);p+=2;return v;};
  const u8=()=>d.getUint8(p++);
  const varint=()=>{let v=0,b;do{b=u8();v=(v<<7)|(b&0x7F);}while(b&0x80);return v;};
  if(u32()!==0x4D546864) throw new Error('不是 MIDI 文件');
  u32(); u16(); const ntr=u16(), div=u16();
  if(div&0x8000) throw new Error('暂不支持 SMPTE 时间格式');
  let bpmFound=null; const hits=[];
  for(let tr=0;tr<ntr;tr++){
    if(u32()!==0x4D54726B) throw new Error('轨道块损坏');
    const len=u32(); const end=p+len;
    let tick=0, status=0;
    while(p<end){
      tick+=varint();
      let s=u8();
      if(s<0x80){ p--; s=status; } else status=s;
      if(s===0xFF){
        const type=u8(), l=varint();
        if(type===0x51 && bpmFound===null){
          const mpqn=(d.getUint8(p)<<16)|(d.getUint8(p+1)<<8)|d.getUint8(p+2);
          bpmFound=60000000/mpqn;
        }
        p+=l;
      } else if(s===0xF0||s===0xF7){ p+=varint(); }
      else {
        const hi=s&0xF0, ch=s&0x0F;
        if(hi===0xC0||hi===0xD0){ p+=1; }
        else {
          const d1=u8(), d2=u8();
          if(hi===0x90 && d2>0 && ch===9) hits.push({tick, note:d1, vel:d2});
        }
      }
    }
    p=end;
  }
  return { div, bpm: bpmFound||120, hits };
}
function midiToGroove(buf, fname){
  const { div, bpm, hits } = parseMidi(buf);
  const notes=[];
  for(const h of hits){
    const lane=GM_MAP[h.note];
    if(!lane) continue;
    notes.push({ b:h.tick/div, lane,
      vel:Math.max(.15,Math.min(1,h.vel/127)),
      open:h.note===46 });
  }
  if(!notes.length) throw new Error('通道 10 上没有找到鼓音符');
  notes.sort((a,b)=>a.b-b.b);
  const maxB=notes[notes.length-1].b;
  const loop=Math.max(4, Math.ceil((maxB+.001)/4)*4);
  return { name:'MIDI · '+fname, bpm:Math.round(bpm), loop, notes };
}
const midiBtn=document.getElementById('midiBtn'), midiFile=document.getElementById('midiFile');
midiBtn.addEventListener('click',()=>midiFile.click());
midiFile.addEventListener('change',()=>{
  const f=midiFile.files[0];
  if(!f) return;
  f.arrayBuffer().then(buf=>{
    const g=midiToGroove(buf, f.name.replace(/\.midi?$/i,''));
    GROOVES.push(g);
    rebuildGrooveSel();
    loadGroove(GROOVES.length-1);
    if(ctx && startTime>0) start();
  }).catch(err=>alert('MIDI 解析失败：'+err.message));
  midiFile.value='';
});

function start(){
  if(!ctx) initAudio();
  ctx.resume();
  bpm=+bpmSlider.value;
  startTime = ctx.currentTime + LEAD;
  schedPtr=0; schedLoop=0; hitSet.clear(); particles=[]; flashes={};
  playing=true;
  playBtn.innerHTML='⏸&nbsp;暂停';
}
function pause(){ playing=false; ctx.suspend(); playBtn.innerHTML='▶&nbsp;继续'; }
function resume(){ playing=true; ctx.resume(); playBtn.innerHTML='⏸&nbsp;暂停'; }
playBtn.addEventListener('click',()=>{
  if(!ctx || startTime===0) start();
  else if(playing) pause();
  else resume();
});

/* 键盘实时演奏 */
const KEYMAP={ b:'kick', j:'snare', f:'hihat', g:['hihat',true],
  u:'tom1', i:'tom2', k:'ftom', r:'crashL', t:'crashR', o:'ride', y:'cowbell' };

/* 左侧图例（带 icon）*/
function legendIcon(lane, open){
  const col = COLOR(lane);
  const k = KIT[lane];
  const S = `width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"`;
  if(lane==='cowbell')
    return `<svg ${S}><polygon points="6.5,4 11.5,4 13.5,14 4.5,14" fill="${col}33" stroke="${col}" stroke-width="1.4"/></svg>`;
  if(lane==='kick')
    return `<svg ${S}><circle cx="9" cy="8" r="6" fill="${col}22" stroke="${col}" stroke-width="2"/><rect x="8" y="14" width="2" height="3" fill="${col}"/></svg>`;
  if(k.type==='cym'||k.type==='hh'){
    const o = open ? `<circle cx="9" cy="3.2" r="1.7" fill="none" stroke="${col}" stroke-width="1.1"/>` : '';
    return `<svg ${S}>${o}<ellipse cx="9" cy="10" rx="7.5" ry="2.8" fill="${col}33" stroke="${col}" stroke-width="1.4"/><circle cx="9" cy="10" r="1.2" fill="${col}"/></svg>`;
  }
  return `<svg ${S}><circle cx="9" cy="9" r="6.5" fill="${col}22" stroke="${col}" stroke-width="1.6"/><circle cx="9" cy="9" r="3.4" fill="none" stroke="${col}55" stroke-width="1"/></svg>`;
}
(function buildLegend(){
  const rows = [
    ['B','kick','底鼓'], ['J','snare','军鼓'],
    ['F','hihat','闭镲'], ['G','hihat','开镲',true],
    ['U','tom1','嗵鼓 1'], ['I','tom2','嗵鼓 2'], ['K','ftom','落地嗵'],
    ['R','crashL','左吊镲'], ['T','crashR','右吊镲'],
    ['O','ride','叮叮'], ['Y','cowbell','牛铃'],
  ];
  const el = document.getElementById('legend');
  for(const [key,lane,label,open] of rows){
    const div = document.createElement('div');
    div.className='lg-row';
    div.innerHTML = `<kbd>${key}</kbd>${legendIcon(lane,open)}<span>${label}</span>`;
    el.appendChild(div);
  }
})();
window.addEventListener('keydown',e=>{
  if(e.repeat) return;
  const m=KEYMAP[e.key.toLowerCase()];
  if(!m) return;
  if(!ctx) initAudio();
  ctx.resume();
  const lane=Array.isArray(m)?m[0]:m, open=Array.isArray(m);
  playDrum(lane, ctx.currentTime, .95, open);
  const nowP=performance.now()/1000;
  flashes[lane]=nowP;
  stickHit(lane,nowP);
  const kp=kitPos(lane);
  spawnParticles(kp.x, kp.y, COLOR(lane), .9);
});
</script>
